<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>System Zamówień</title>
<style>
    body { font-family: Arial; margin: 20px; }

    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        max-width: 600px;
    }

    .table {
        border: 2px solid #333;
        padding: 10px;
    }

    .seats {
        display: flex;
        gap: 5px;
        margin-top: 10px;
    }

    .seat {
        flex: 1;
        border: 1px solid #666;
        padding: 10px;
        cursor: pointer;
        background: #f5f5f5;
        text-align: center;
    }

    .seat:hover { background: #ddd; }

    #modal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: white;
        padding: 20px;
        width: 300px;
    }

    textarea { width: 100%; }

    .topbar { margin-bottom: 20px; }

    #summary {
        margin-top: 30px;
        padding: 15px;
        border: 2px dashed #333;
    }
</style>
</head>
<body>

<div class="topbar">
    <button onclick="toggleView()">Przełącz widok (edycja/podgląd)</button>
    <button onclick="editMenu()">Edytuj menu</button>
</div>

<div id="room" class="grid"></div>

<div id="summary"></div>

<div id="modal">
    <div class="modal-content">
        <h3>Zamówienie</h3>

        <label>Przystawka:</label><br>
        <select id="starter"></select><br><br>

        <label>Danie główne:</label><br>
        <select id="main"></select><br><br>

        <label>Płatność:</label><br>
        <select id="payment">
            <option>Karta</option>
            <option>Gotówka</option>
        </select><br><br>

        <label>Uwagi:</label><br>
        <textarea id="notes"></textarea><br><br>

        <button onclick="saveOrder()">Zapisz</button>
        <button onclick="closeModal()">Anuluj</button>
    </div>
</div>

<script>
let editMode = true;
let selectedSeat = null;

let menu = {
    starters: ["Zupa pomidorowa", "Sałatka"],
    mains: ["Kurczak", "Makaron"]
};

let orders = {};

function renderRoom() {
    const room = document.getElementById("room");
    room.innerHTML = "";

    for (let i = 1; i <= 9; i++) {
        const table = document.createElement("div");
        table.className = "table";
        table.innerHTML = "<b>Stół " + i + "</b>";

        const seatsWrapper = document.createElement("div");
        seatsWrapper.className = "seats";

        for (let s = 1; s <= 2; s++) {
            const seatId = i + "-" + s;
            const seat = document.createElement("div");
            seat.className = "seat";

            let text = "Miejsce " + s;

            if (orders[seatId]) {
                const o = orders[seatId];
                text += "<br>" + o.starter + "<br>" + o.main;
            }

            seat.innerHTML = text;

            if (editMode) {
                seat.onclick = () => openModal(seatId);
            }

            seatsWrapper.appendChild(seat);
        }

        table.appendChild(seatsWrapper);
        room.appendChild(table);
    }

    renderSummary();
}

function renderSummary() {
    const summary = document.getElementById("summary");

    if (editMode) {
        summary.innerHTML = "";
        return;
    }

    let starterCount = {};
    let mainCount = {};

    Object.values(orders).forEach(o => {
        starterCount[o.starter] = (starterCount[o.starter] || 0) + 1;
        mainCount[o.main] = (mainCount[o.main] || 0) + 1;
    });

    let html = "<h3>Podsumowanie dla kuchni</h3>";

    html += "<b>Przystawki:</b><br>";
    for (let s in starterCount) {
        html += s + ": " + starterCount[s] + "<br>";
    }

    html += "<br><b>Dania główne:</b><br>";
    for (let m in mainCount) {
        html += m + ": " + mainCount[m] + "<br>";
    }

    summary.innerHTML = html;
}

function openModal(seatId) {
    selectedSeat = seatId;

    const starterSelect = document.getElementById("starter");
    const mainSelect = document.getElementById("main");

    starterSelect.innerHTML = menu.starters.map(s => `<option>${s}</option>`).join("");
    mainSelect.innerHTML = menu.mains.map(m => `<option>${m}</option>`).join("");

    if (orders[seatId]) {
        const o = orders[seatId];
        starterSelect.value = o.starter;
        mainSelect.value = o.main;
        document.getElementById("payment").value = o.payment;
        document.getElementById("notes").value = o.notes;
    } else {
        document.getElementById("notes").value = "";
    }

    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function saveOrder() {
    orders[selectedSeat] = {
        starter: document.getElementById("starter").value,
        main: document.getElementById("main").value,
        payment: document.getElementById("payment").value,
        notes: document.getElementById("notes").value
    };

    closeModal();
    renderRoom();
}

function toggleView() {
    editMode = !editMode;
    renderRoom();
}

function editMenu() {
    const starters = prompt("Podaj przystawki (oddziel przecinkami)", menu.starters.join(","));
    const mains = prompt("Podaj dania główne (oddziel przecinkami)", menu.mains.join(","));

    if (starters) menu.starters = starters.split(",").map(s => s.trim());
    if (mains) menu.mains = mains.split(",").map(m => m.trim());

    renderRoom();
}

renderRoom();
</script>

</body>
</html>
